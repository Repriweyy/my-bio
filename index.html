<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repriwey's BIO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><defs><linearGradient id=%22g%22 x1=%220%%22 y1=%220%%22 x2=%22100%%22 y2=%22100%%22><stop offset=%220%%22 style=%22stop-color:%235E4B43;stop-opacity:1%22 /><stop offset=%22100%%22 style=%22stop-color:%232E1F1B;stop-opacity:1%22 /></linearGradient></defs><circle cx=%2250%22 cy=%2250%22 r=%2248%22 fill=%22url(%23g)%22 stroke=%22%23bca89f%22 stroke-width=%224%22/><text y=%2250%%22 x=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-size=%2255%22 fill=%22%23bca89f%22 font-family=%22Arial, sans-serif%22 font-weight=%22bold%22>R</text></svg>">
</head>
<body>
    <div class="background-ornament sphere-1"></div>
    <div class="background-ornament sphere-2"></div>
    <div class="background-ornament sphere-3"></div>
    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <header class="hero">
        <div class="welcome-container">
            <span class="welcome-text">welcome</span>
            <h1 class="main-title">Repriwey</h1>
            <a href="#about" class="glass-button">
                Down <span class="arrow">↓</span>
            </a>
        </div>
    </header>

    <main class="content" id="about">
        <div class="glass-container">
            <div class="info-card">
                <p><i class="fab fa-telegram"></i> <strong>Telegram:</strong> @Repriweyy</p>
                <p><i class="fab fa-discord"></i> <strong>Discord:</strong> repriweyy</p>
                <p><i class="fab fa-weixin"></i> <strong>WeChat ID:</strong> Repriwey</p>
                <p>
                    <i class="fas fa-globe-europe"></i> 
                    <strong>Country:</strong> Russia 
                    <img src="https://flagcdn.com/ru.svg" width="30" alt="Russia" style="vertical-align: middle; margin-left: 5px; border-radius: 2px;">
                </p>
                <p><i class="fas fa-birthday-cake"></i> <strong>Birthday:</strong> 5 Nov</p>
            </div>

            <div class="info-card">
                <h3>Activity</h3>
                <p>омайгад</p>
            </div>
        </div>

        <div class="monster-wrapper">
            <img src="monster.png" class="monster-pic" id="monster-btn" alt="Cookie Monster">
        </div>
    </main>

    <script>
        // Логика курсора
        const cursor = document.querySelector('.cursor');
        const follower = document.querySelector('.cursor-follower');

        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            follower.style.left = e.clientX - 11 + 'px';
            follower.style.top = e.clientY - 11 + 'px';
        });

        // Интерактив с печеньками
        const monster = document.getElementById('monster-btn');
        monster.addEventListener('click', (e) => {
            for(let i = 0; i < 3; i++) { // Создаем 3 печеньки при клике
                const cookie = document.createElement('div');
                cookie.innerText = '🍪';
                cookie.className = 'cookie-particle';
                cookie.style.left = `calc(50% + ${Math.random() * 60 - 30}px)`;
                cookie.style.bottom = '150px';
                monster.parentElement.appendChild(cookie);
                setTimeout(() => cookie.remove(), 1000);
            }
        });

        const links = document.querySelectorAll('a, .info-card, #monster-btn');
        links.forEach(link => {
            link.addEventListener('mouseenter', () => {
                follower.style.transform = 'scale(2.5)';
                follower.style.background = 'rgba(255, 255, 255, 0.2)';
            });
            link.addEventListener('mouseleave', () => {
                follower.style.transform = 'scale(1)';
                follower.style.background = 'rgba(255, 255, 255, 0.1)';
            });
        });
    </script>
</body>
</html>
